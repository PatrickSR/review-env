<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Environment</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1e1e1e; color: #ccc; font-family: -apple-system, sans-serif; height: 100vh; }
    #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    #loading h2 { margin-bottom: 16px; }
    #loading .status { color: #888; font-size: 14px; }
    #loading .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #0af;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #terminal-frame { display: none; width: 100%; height: 100vh; border: none; }
    #error { display: none; text-align: center; padding-top: 40vh; color: #f55; }
    #tool-select { display: none; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; gap: 16px; }
    #tool-select h2 { margin-bottom: 8px; }
    .tool-grid { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; max-width: 600px; }
    .tool-card { background: #2a2a2a; border: 1px solid #444; border-radius: 8px; padding: 16px 24px;
      cursor: pointer; transition: all 0.2s; min-width: 160px; text-align: center; }
    .tool-card:hover { border-color: #0af; background: #333; }
    .tool-card.active { border-color: #0f0; background: #1a3a1a; }
    .tool-card .name { font-size: 16px; font-weight: 600; color: #eee; }
    .tool-info { color: #888; font-size: 13px; margin-top: 16px; }
    #current-tool { display: none; position: fixed; top: 8px; right: 8px; background: #2a2a2a;
      border: 1px solid #444; border-radius: 6px; padding: 6px 12px; font-size: 12px; z-index: 100;
      display: flex; align-items: center; gap: 8px; }
    #current-tool .switch-btn { background: #444; border: none; color: #ccc; padding: 2px 8px;
      border-radius: 4px; cursor: pointer; font-size: 11px; }
    #current-tool .switch-btn:hover { background: #555; }
    .no-images { color: #f90; font-size: 14px; }
  </style>
</head>
<body>
  <div id="tool-select">
    <h2>选择 AI 工具</h2>
    <div class="tool-grid" id="tool-grid"></div>
    <div class="tool-info" id="tool-info"></div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <h2>Review Environment</h2>
    <div class="status" id="status-text">正在连接...</div>
  </div>

  <div id="current-tool">
    <span id="current-tool-name"></span>
    <button class="switch-btn" onclick="showToolSelect()">切换</button>
    <button class="switch-btn" onclick="stopContainer()" style="color:#f55">停止</button>
  </div>

  <iframe id="terminal-frame"></iframe>
  <div id="error"><h2>出错了</h2><p id="error-text"></p></div>

  <script>
    const parts = location.pathname.split('/');
    const projectId = parts[2];
    const mrIid = parts[3];
    const basePath = `/mr/${projectId}/${mrIid}`;

    const toolSelectEl = document.getElementById('tool-select');
    const toolGridEl = document.getElementById('tool-grid');
    const toolInfoEl = document.getElementById('tool-info');
    const loadingEl = document.getElementById('loading');
    const statusText = document.getElementById('status-text');
    const frameEl = document.getElementById('terminal-frame');
    const errorEl = document.getElementById('error');
    const errorText = document.getElementById('error-text');
    const currentToolEl = document.getElementById('current-tool');
    const currentToolName = document.getElementById('current-tool-name');

    let images = [];

    async function init() {
      // Check if container already running
      const statusRes = await fetch(`${basePath}/status`);
      const statusData = await statusRes.json();

      if (statusData.status !== 'not_found') {
        // Container exists, show loading/terminal
        currentToolName.textContent = statusData.display_name || 'Unknown';
        currentToolEl.style.display = 'flex';
        toolSelectEl.style.display = 'none';
        loadingEl.style.display = 'flex';
        pollStatus();
        return;
      }

      // No container, show tool selection
      await loadImages();
    }

    async function loadImages() {
      const res = await fetch(`${basePath}/images`);
      images = await res.json();

      if (images.length === 0) {
        toolGridEl.innerHTML = '<div class="no-images">该项目尚未配置任何 AI 工具镜像，请联系管理员配置。</div>';
        toolSelectEl.style.display = 'flex';
        loadingEl.style.display = 'none';
        return;
      }

      toolGridEl.innerHTML = '';
      for (const img of images) {
        const card = document.createElement('div');
        card.className = 'tool-card';
        card.innerHTML = `<div class="name">${img.display_name}</div>`;
        card.onclick = () => startWithImage(img.id, img.display_name);
        toolGridEl.appendChild(card);
      }

      toolSelectEl.style.display = 'flex';
      loadingEl.style.display = 'none';
    }

    async function startWithImage(imageId, displayName) {
      toolSelectEl.style.display = 'none';
      loadingEl.style.display = 'flex';
      statusText.textContent = '正在启动容器...';
      currentToolName.textContent = displayName;
      currentToolEl.style.display = 'flex';

      try {
        const res = await fetch(`${basePath}/start`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ imageId }),
        });
        const data = await res.json();
        if (!res.ok) {
          showError(data.error || '启动失败');
          return;
        }
        pollStatus();
      } catch {
        showError('请求失败');
      }
    }

    async function pollStatus() {
      try {
        const res = await fetch(`${basePath}/status`);
        const data = await res.json();

        if (data.status === 'ready') {
          showTerminal(data.ports);
          return;
        }
        if (data.status === 'error') {
          showError(data.message || '容器初始化失败');
          return;
        }
        if (data.status === 'not_found') {
          statusText.textContent = '正在创建容器...';
        } else {
          const labels = { creating: '正在创建容器...', initializing: '正在初始化环境...' };
          statusText.textContent = data.message ? `${labels[data.status] || data.status}（${data.message}）` : (labels[data.status] || data.status);
        }
        setTimeout(pollStatus, 2000);
      } catch {
        statusText.textContent = '连接失败，重试中...';
        setTimeout(pollStatus, 3000);
      }
    }

    function showError(msg) {
      loadingEl.style.display = 'none';
      toolSelectEl.style.display = 'none';
      errorEl.style.display = 'block';
      errorText.textContent = msg;
    }

    function showTerminal(ports) {
      loadingEl.style.display = 'none';
      toolSelectEl.style.display = 'none';
      frameEl.style.display = 'block';
      const ttydPort = ports && ports[7681];
      if (ttydPort) {
        frameEl.src = `http://${location.hostname}:${ttydPort}/`;
      } else {
        showError('无法获取 ttyd 端口映射');
      }
    }

    function showToolSelect() {
      frameEl.style.display = 'none';
      currentToolEl.style.display = 'none';
      loadingEl.style.display = 'none';
      errorEl.style.display = 'none';
      loadImages();
    }

    async function stopContainer() {
      if (!confirm('确定要停止当前容器吗？')) return;
      await fetch(`${basePath}/stop`, { method: 'POST' });
      frameEl.style.display = 'none';
      currentToolEl.style.display = 'none';
      loadingEl.style.display = 'none';
      loadImages();
    }

    init();
  </script>
</body>
</html>
