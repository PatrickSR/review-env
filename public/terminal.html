<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Environment</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1e1e1e; color: #ccc; font-family: -apple-system, sans-serif; height: 100vh; }
    #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    #loading h2 { margin-bottom: 16px; }
    #loading .status { color: #888; font-size: 14px; }
    #loading .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #0af;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #terminal-frame { display: none; width: 100%; height: 100vh; border: none; }
    #error { display: none; text-align: center; padding-top: 40vh; color: #f55; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <h2>Review Environment</h2>
    <div class="status" id="status-text">正在连接...</div>
  </div>
  <iframe id="terminal-frame"></iframe>
  <div id="error">
    <h2>出错了</h2>
    <p id="error-text"></p>
  </div>

  <script>
    const mrId = location.pathname.split('/')[2];
    const statusUrl = `/mr/${mrId}/status`;
    const ttydUrl = `/mr/${mrId}/terminal/`;

    const loadingEl = document.getElementById('loading');
    const statusText = document.getElementById('status-text');
    const frameEl = document.getElementById('terminal-frame');
    const errorEl = document.getElementById('error');
    const errorText = document.getElementById('error-text');

    const STATUS_LABELS = {
      not_found: '正在创建容器...',
      creating: '正在创建容器...',
      initializing: '正在初始化环境...',
      ready: '环境就绪',
      error: '初始化失败',
    };

    async function pollStatus() {
      try {
        const res = await fetch(statusUrl);
        const data = await res.json();

        if (data.status === 'ready') {
          showTerminal();
          return;
        }

        if (data.status === 'error') {
          showError(data.message || '容器初始化失败');
          return;
        }

        const label = STATUS_LABELS[data.status] || data.status;
        statusText.textContent = data.message ? `${label}（${data.message}）` : label;
        setTimeout(pollStatus, 2000);
      } catch {
        statusText.textContent = '连接失败，重试中...';
        setTimeout(pollStatus, 3000);
      }
    }

    function showError(msg) {
      loadingEl.style.display = 'none';
      errorEl.style.display = 'block';
      errorText.textContent = msg;
    }

    function showTerminal() {
      loadingEl.style.display = 'none';
      frameEl.style.display = 'block';
      frameEl.src = ttydUrl;
    }

    pollStatus();
  </script>
</body>
</html>
